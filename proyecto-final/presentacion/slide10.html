<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR-Cirugía — Escenario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="deck.css">
<script src="theme.js"></script>
<style>
  .scene { position:absolute; inset:0; z-index:2; display:grid; grid-template-columns:1.05fr 1fr; }
  .scene .pane-img { position:relative; overflow:hidden; }
  .scene .pane-img img { width:100%; height:100%; object-fit:cover; }
  .scene .pane-img::after { content:""; position:absolute; inset:0; box-shadow:inset -60px 0 80px -30px var(--bg-1), inset 0 0 0 1px var(--panel-line); }
  .scene .pane-text { padding:150px 90px 120px 70px; display:flex; flex-direction:column; justify-content:center; }
</style>
</head>
<body>
<div class="scaler">
  <div class="slide">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <svg class="ekg" viewBox="0 0 1460 36" preserveAspectRatio="none"><path d="M0 18 H300 l10 -13 7 26 9 -20 10 16 H760 l10 -13 7 26 9 -20 10 16 H1180 l10 -13 7 26 9 -20 10 16 H1460"/></svg>
    <span class="brand-tag">VR-Cirugía</span>
    <span class="page-tag"><b>11</b> / 12</span>
    <div class="scene">
      <div class="pane-img"><img src="media/quirofano.png" alt="Modelo de quirófano virtual con mesa de operaciones, lámparas quirúrgicas y equipamiento médico"></div>
      <div class="pane-text">
        <p style="font-family:var(--font-head);font-weight:700;font-size:16px;letter-spacing:.3em;text-transform:uppercase;color:var(--guinda);margin-bottom:16px;">06 · Escenario</p>
        <h2 class="title" style="font-size:60px;">Quirófano <span class="accent">virtual</span></h2>
        <div class="title-rule"><span class="line"></span><span class="diamond"></span></div>
        <p class="body-text" style="font-size:23px;max-width:560px;">Representación visual del entorno de quirófano que servirá como base del ambiente virtual inmersivo: mesa de operaciones, lámparas cialíticas y equipamiento médico dispuesto para los protocolos preoperatorios.</p>
      </div>
    </div>
  </div>
</div>
<script src="slide.js"></script>
</body>
</html>
